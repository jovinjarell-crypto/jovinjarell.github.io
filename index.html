<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess.com Clone | PawnPub Play Arena</title>
    
    <!-- Core External Script Inclusions -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <style>
        /* AUTHENTIC CHESS.COM PALETTE SPECIFICATIONS */
        :root {
            --body-bg: #312e2b;
            --sidebar-bg: #262421;
            --panel-bg: #262421;
            --panel-well: #211f1c;
            --border-subtle: #3d3a37;
            --text-muted: #bababa;
            --text-light: #ffffff;
            --chess-green: #81b64c;
            --chess-green-hover: #a3d16c;
            --accent-orange: #e58e26;
            --move-bg-even: #2b2926;
            --move-bg-odd: #262421;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Helvetica, Arial, sans-serif;
            background-color: var(--body-bg);
            color: var(--text-light);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* COMPACT LEFT SIDEBAR NAVIGATION */
        .sidebar {
            width: 140px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            box-sizing: border-box;
            z-index: 10;
        }

        .brand {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text-light);
            text-decoration: none;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }
        .brand span { color: var(--chess-green); }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            padding: 0 8px;
            box-sizing: border-box;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 6px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
            gap: 4px;
        }
        .nav-item span.icon {
            font-size: 1.4rem;
            color: var(--text-light);
        }
        .nav-item:hover, .nav-item.active {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
        }
        .nav-item.active {
            border-left: 3px solid var(--chess-green);
        }

        /* THREE COLUMN ARENA PLATFORM */
        .viewport {
            flex: 1;
            display: flex;
            padding: 20px;
            box-sizing: border-box;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .view-section {
            display: none;
            width: 100%;
            height: 100%;
            max-width: 1200px;
        }
        .view-section.active {
            display: flex;
            gap: 20px;
        }

        /* CHESSBOARD LAYOUT ENGINE */
        .board-column {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 660px;
        }

        /* Player Tags mimicking Chess.com info layout */
        .player-tag {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 4px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .player-info { display: flex; align-items: center; gap: 8px; }
        .player-badge {
            background-color: #403d39;
            font-size: 0.75rem;
            padding: 1px 4px;
            border-radius: 2px;
            color: var(--text-muted);
        }
        .time-box {
            background-color: #211f1c;
            padding: 4px 8px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 1rem;
            font-weight: 700;
            border: 1px solid var(--border-subtle);
        }

        .board-frame {
            width: 100%;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* CHESS.COM RIGHT SIDE CONSOLE PANEL */
        .console-column {
            flex: 0.9;
            background-color: var(--panel-bg);
            border-radius: 5px;
            border: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-height: 700px;
        }

        .console-header {
            background-color: var(--panel-well);
            padding: 15px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .console-header h3 { margin: 0; font-size: 1rem; }

        .game-meta-box {
            background-color: var(--panel-well);
            margin: 15px;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--border-subtle);
        }

        /* Move history log grid */
        .move-history-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
        }
        .move-row {
            display: grid;
            grid-template-columns: 0.5fr 1fr 1fr;
            padding: 6px 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .move-row:nth-child(even) { background-color: var(--move-bg-even); }
        .move-row:nth-child(odd) { background-color: var(--move-bg-odd); }
        .move-index { color: #75716c; }

        .console-footer {
            padding: 15px;
            background-color: var(--panel-well);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* CHESS.COM PRIMARY ACTION BUTTONS */
        .btn-game {
            background-color: var(--chess-green);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #588233;
            transition: transform 0.05s, background-color 0.1s;
        }
        .btn-game:hover { background-color: var(--chess-green-hover); }
        .btn-game:active { transform: translateY(2px); box-shadow: 0 2px 0 #588233; }

        .btn-sub {
            background-color: #3d3a37;
            color: var(--text-light);
            border: none;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-sub:hover { background-color: #484541; }

        /* INTERFACE BOX FOR PROFILE VIEWS */
        .profile-wrapper {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 5px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            margin: auto;
        }
        .auth-input {
            width: 100%;
            background-color: var(--panel-well);
            border: 1px solid var(--border-subtle);
            padding: 12px;
            color: white;
            border-radius: 4px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR INTERFACE FRAME -->
    <nav class="sidebar">
        <a href="#" class="brand">Pawn<span>Pub</span></a>
        <div class="nav-links">
            <div class="nav-item active" onclick="switchTab('play-arena', this)">
                <span class="icon">⚔️</span>
                <div>Play</div>
            </div>
            <div class="nav-item" onclick="switchTab('profile-tab', this)">
                <span class="icon">👤</span>
                <div>Profile</div>
            </div>
        </div>
    </nav>

    <!-- CONTENT ARENA VIEWPORT -->
    <main class="viewport">

        <!-- TAB A: MULTIPLAYER/AI PLAY ARENA (CHESS.COM CORE STRUCT) -->
        <section id="play-arena" class="view-section active">
            
            <!-- COLUMN 1 & 2: THE CHESSBOARD SYSTEM MATRIX -->
            <div class="board-column">
                
                <!-- Opponent Card Header -->
                <div class="player-tag">
                    <div class="player-info">
                        <span style="color:#da3637; font-size:0.7rem; font-weight:900; background:rgba(218,54,55,0.15); padding:2px 4px; border-radius:2px;">AI</span>
                        <strong id="opponent-name">Stockfish Engine</strong>
                        <span class="player-badge">1500</span>
                    </div>
                    <div class="time-box">10:00</div>
                </div>

                <!-- Main Render Window -->
                <div class="board-frame">
                    <div id="main-live-board"></div>
                </div>

                <!-- Active User Card Footer -->
                <div class="player-tag">
                    <div class="player-info">
                        <span style="font-size:1rem;">🇺🇸</span>
                        <strong id="local-player-name">Guest Player</strong>
                        <span class="player-badge" id="local-player-elo">1200</span>
                    </div>
                    <div class="time-box">10:00</div>
                </div>
            </div>

            <!-- COLUMN 3: SIDEBAR CONTROL PANEL GAME STATS -->
            <div class="console-column">
                <div class="console-header">
                    <h3>New Match Sandbox</h3>
                    <span style="font-size:0.8rem; color:var(--text-muted);">Standard 10 min</span>
                </div>

                <div class="game-meta-box">
                    <div style="font-size:0.85rem; font-weight:700; color:var(--text-muted); margin-bottom:4px;">Match Analytics</div>
                    <span id="match-status-label" style="color:var(--accent-orange); font-size:0.9rem;">Waiting to launch engine...</span>
                </div>

                <!-- Live Move Feed Engine -->
                <div class="move-history-container" id="move-history-log">
                    <!-- Real-time dynamic entries will injection nest here -->
                </div>

                <div class="console-footer">
                    <button class="btn-game" onclick="triggerMatchInitialization()">New Match</button>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <button class="btn-sub" onclick="board.flip()">Flip Board</button>
                        <button class="btn-sub" onclick="resignCurrentMatch()">Resign</button>
                    </div>
                </div>
            </div>

        </section>

        <!-- TAB B: USER METRIC REGISTRATION DISPLAY -->
        <section id="profile-tab" class="view-section">
            <div class="profile-wrapper">
                <h3>Chess Profile Verification</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">Link your personal email address to log matches internationally.</p>
                
                <div id="logged-out-zone">
                    <input type="email" id="user-email-field" class="auth-input" placeholder="Email Address">
                    <input type="password" id="user-pass-field" class="auth-input" placeholder="Password">
                    <button class="btn-game" style="width:100%; font-size:1rem; padding:12px; margin-bottom:10px;" onclick="authenticateUserIdentity()">Register Credentials</button>
                </div>

                <div id="logged-in-zone" style="display:none; text-align:center;">
                    <div style="width:60px; height:60px; background:var(--chess-green); border-radius:50%; margin:0 auto 15px auto; display:flex; align-items:center; justify-content:center; font-size:1.5rem; font-weight:bold;">P</div>
                    <h4 id="display-profile-user" style="margin:0 0 5px 0;">Verified Player</h4>
                    <p id="display-profile-email" style="color:var(--text-muted); font-size:0.85rem; margin:0 0 20px 0;">email@address.com</p>
                    <button class="btn-sub" style="width:100%; color:#da3637;" onclick="logoutIdentity()">Disconnect</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        var board = null;
        var game = new Chess();
        var currentMoveIndex = 1;

        function switchTab(targetViewId, element) {
            $('.view-section').removeClass('active');
            $('.nav-item').removeClass('active');
            $('#' + targetViewId).addClass('active');
            $(element).addClass('active');
            if(targetViewId === 'play-arena' && board !== null) { board.resize(); }
        }

        // CHESS ENGINE PLAYMAKING INTEGRATIONS
        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false; // Lock black pieces for engine play
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';
            
            appendMoveToConsoleLog(move.san, 'white');
            document.getElementById('match-status-label').innerText = "Opponent thinking...";
            window.setTimeout(triggerEngineResponseTurn, 300);
        }

        function triggerEngineResponseTurn () {
            var possibleMoves = game.moves();
            if (possibleMoves.length === 0) {
                document.getElementById('match-status-label').innerText = "Match Over. Victory!";
                return;
            }

            var randomIdx = Math.floor(Math.random() * possibleMoves.length);
            var opponentMove = game.move(possibleMoves[randomIdx]);
            board.position(game.fen());
            
            appendMoveToConsoleLog(opponentMove.san, 'black');
            
            if(game.game_over()) {
                document.getElementById('match-status-label').innerText = "Game Over.";
            } else {
                document.getElementById('match-status-label').innerText = "Your turn to move.";
            }
        }

        function appendMoveToConsoleLog(sanStr, colorString) {
            const historyLog = document.getElementById('move-history-log');
            
            if (colorString === 'white') {
                const row = document.createElement('div');
                row.className = 'move-row';
                row.id = 'move-index-row-' + currentMoveIndex;
                
                const idxSpan = document.createElement('span');
                idxSpan.className = 'move-index';
                idxSpan.innerText = currentMoveIndex + ".";
                
                const whiteSpan = document.createElement('span');
                whiteSpan.innerText = sanStr;
                
                row.appendChild(idxSpan);
                row.appendChild(whiteSpan);
                historyLog.appendChild(row);
                historyLog.scrollTop = historyLog.scrollHeight;
            } else {
                const targetRow = document.getElementById('move-index-row-' + currentMoveIndex);
                if (targetRow) {
                    const blackSpan = document.createElement('span');
                    blackSpan.innerText = sanStr;
                    targetRow.appendChild(blackSpan);
                }
                currentMoveIndex++;
            }
        }

        function triggerMatchInitialization() {
            game.reset();
            board.start();
            document.getElementById('move-history-log').innerHTML = '';
            currentMoveIndex = 1;
            document.getElementById('match-status-label').innerText = "Match running active.";
        }

        function resignCurrentMatch() {
            document.getElementById('match-status-label').innerText = "Match forfeited via resignation.";
            game.clear();
        }

        // PROFILE AUTHS
        function authenticateUserIdentity() {
            const email = document.getElementById('user-email-field').value;
            if(!email || !email.includes('@')) {
                alert("Please provide a valid account email setup.");
                return;
            }
            document.getElementById('logged-out-zone').style.display = 'none';
            document.getElementById('logged-in-zone').style.display = 'block';
            
            document.getElementById('display-profile-email').innerText = email;
            const parsedName = email.split('@')[0].toUpperCase();
            document.getElementById('display-profile-user').innerText = parsedName;
            
            // Sync tags back inside live headers
            document.getElementById('local-player-name').innerText = parsedName;
            document.getElementById('local-player-elo').innerText = "1435";
        }

        function logoutIdentity() {
            document.getElementById('logged-in-zone').style.display = 'none';
            document.getElementById('logged-out-zone').style.display = 'block';
            document.getElementById('local-player-name').innerText = "Guest Player";
            document.getElementById('local-player-elo').innerText = "1200";
        }

        // MOUNT CHESSBOARD CONTEXTS
        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: () => board.position(game.fen()),
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        board = Chessboard('main-live-board', config);
    </script>
</body>
</html>
